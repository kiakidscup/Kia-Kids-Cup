<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Kia Kid's Cup 小小世界盃 - 闖關卡及關卡說明</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <style>
        .page-header h1 {
            font-size: clamp(2.3rem, 6vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        /* ===============================
           Lenis 平滑滾動設定
        =============================== */
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
        .lenis.lenis-scrolling iframe { pointer-events: none; }

        body, html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        .quest-container { 
            text-align: center; 
        }

        /* ===============================
           闖關卡圖片展示區設定
        =============================== */
        .quest-images {
            width: 100%;
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .quest-img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            object-fit: cover;
        }

        @media (min-width: 768px) {
            .quest-images {
                flex-direction: row; 
            }
            .quest-img {
                width: 48%; 
            }
        }

        /* ===============================
           文字說明區設定
        =============================== */
        .instructions { 
            text-align: left; 
            margin-top: 40px; 
        }

        .instructions h3 { 
            color: var(--kia-green, #05141f); 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
        }

        .instructions ul { 
            list-style-type: none; 
            padding: 0;
        }

        .instructions li { 
            font-size: 1.2rem; 
            margin-bottom: 15px; 
            padding-left: 30px; 
            position: relative; 
        }

        .instructions li::before { 
            content: '✓'; 
            position: absolute; 
            left: 0; 
            color: var(--kia-green, #42b72a); 
        }

        /* ===============================
           滑動浮出動畫初始狀態
        =============================== */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(40px);
        }

        /* ===============================
           3D 輪播圖 (Coverflow) 設定
        =============================== */
        .carousel-wrapper {
            position: relative;
            width: 100%;
            height: clamp(250px, 40vw, 400px);
            margin: 60px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px; 
        }

        .carousel-track {
            position: relative;
            width: clamp(200px, 30vw, 300px);
            height: 100%;
            transform-style: preserve-3d;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            /* 1. 稍微簡化陰影，太複雜的陰影在移動時非常耗效能 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            /* 2. 移除 z-index 的過渡，避免動畫期間的重繪卡頓 */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.6s ease;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            
            /* 3. 🚀 效能優化關鍵：強制開啟 GPU 硬體加速 */
            will-change: transform, opacity;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transform: translateZ(0); /* 迫使瀏覽器建立獨立的圖層 */
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            -webkit-user-drag: none;
            user-select: none;
        }
        /* 輪播控制按鈕 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            color: #333;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .carousel-btn:hover {
            background: #fff;
            transform: translateY(-50%) scale(1.1);
        }

        .prev-btn { left: 5%; }
        .next-btn { right: 5%; }

        /* ===============================
           手機版調整
        =============================== */
        @media (max-width: 768px) {
            .instructions h3 { font-size: 1.5rem; }
            .instructions li { font-size: 1rem; line-height: 1.7; }
            .carousel-btn { width: 40px; height: 40px; font-size: 1.2rem; }
            .prev-btn { left: 2%; }
            .next-btn { right: 2%; }
        }
    </style>
</head>

<body>
    <div class="page-header scroll-reveal">
        <h1>闖關卡及說明</h1>
        <p>Quest Map</p>
    </div>

    <div class="container quest-container">
        <div class="glass-panel scroll-reveal">
            
            <div class="quest-images">
                <img src="闖關卡1.jpg" alt="闖關卡正面" class="quest-img scroll-reveal">
                <img src="闖關卡2.jpg" alt="闖關卡背面" class="quest-img scroll-reveal">
            </div>

            <div class="instructions scroll-reveal">
                <h3>關卡說明</h3>
                <ul>
                    <li class="scroll-reveal">領取實體闖關卡後，至各區完成指定足球體驗挑戰。</li>
                    <li class="scroll-reveal">每完成一項挑戰，即可由關主蓋上專屬通關印章。</li>
                    <li class="scroll-reveal">集滿 5 個印章，即可至大會服務台兌換摸彩卷，並領取世界盃FIFA的貼紙乙個。</li>
                </ul>
            </div>

            <div class="carousel-wrapper scroll-reveal">
                <button class="carousel-btn prev-btn">❮</button>
                <div class="carousel-track">
                    <div class="carousel-slide"><img src="stage1.jpg" alt="關卡 1"></div>
                    <div class="carousel-slide"><img src="stage2.jpg" alt="關卡 2"></div>
                    <div class="carousel-slide"><img src="stage3.jpg" alt="關卡 3"></div>
                    <div class="carousel-slide"><img src="stage4.jpg" alt="關卡 4"></div>
                    <div class="carousel-slide"><img src="stage5.jpg" alt="關卡 5"></div>
                </div>
                <button class="carousel-btn next-btn">❯</button>
            </div>

        </div>
    </div>

    <script src="toolbar.js"></script>

    <script>
        // =========================================================
        // 1. 初始化 Lenis 平滑滾動
        // =========================================================
        const lenis = new Lenis({
            duration: 1.2,
            easing: function(t) {
                return Math.min(1, 1.001 - Math.pow(2, -10 * t));
            },
            smoothWheel: true
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // =========================================================
        // 2. GSAP 與 ScrollTrigger 連動
        // =========================================================
        gsap.registerPlugin(ScrollTrigger);
        lenis.on('scroll', ScrollTrigger.update);

        gsap.ticker.add(function(time) {
            lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0, 0);

        // =========================================================
        // 3. 滑到哪裡就浮出到哪裡 (Scroll Reveal 動畫)
        // =========================================================
        document.addEventListener('DOMContentLoaded', function() {
            gsap.utils.toArray('.scroll-reveal').forEach(function(el) {
                gsap.to(el, {
                    scrollTrigger: {
                        trigger: el,
                        start: "top 85%",
                        toggleActions: "play none none none"
                    },
                    y: 0,
                    opacity: 1,
                    duration: 1.1,
                    ease: "power3.out"
                });
            });
            ScrollTrigger.refresh();

            // =========================================================
            // 4. 3D 關卡輪播圖邏輯 (包含點擊與手機滑動支援)
            // =========================================================
            const carouselWrapper = document.querySelector('.carousel-wrapper');
            const slides = document.querySelectorAll('.carousel-slide');
            const prevBtn = document.querySelector('.prev-btn');
            const nextBtn = document.querySelector('.next-btn');

            // 從關卡 3 開始 (Array 索引為 2)
            let currentIndex = 2; 

            function updateCarousel() {
                slides.forEach((slide, i) => {
                    // 計算最短距離以實現無限循環
                    let offset = (i - currentIndex + 5) % 5;
                    if (offset > 2) offset -= 5;

                    // 根據位移距離計算 3D 變化
                    let translateX = offset * 110; 
                    let scale = 1 - Math.abs(offset) * 0.2; 
                    let rotateY = offset * -25; 
                    let zIndex = 5 - Math.abs(offset); 
                    let opacity = 1 - Math.abs(offset) * 0.4; 

                    slide.style.transform = `translateX(${translateX}%) scale(${scale}) rotateY(${rotateY}deg)`;
                    slide.style.zIndex = zIndex;
                    slide.style.opacity = opacity;
                    
                    // 讓當下置中的卡片滑鼠游標維持預設，旁邊的卡片變成手指(提示可點擊)
                    slide.style.cursor = offset === 0 ? 'default' : 'pointer';
                });
            }

            // 初始化輪播圖位置
            updateCarousel();

            // --- 點擊旁邊的卡片直接切換 ---
            slides.forEach((slide, index) => {
                slide.addEventListener('click', () => {
                    if (currentIndex !== index) {
                        currentIndex = index;
                        updateCarousel();
                    }
                });
            });

            // --- 左右按鈕控制 ---
            nextBtn.addEventListener('click', () => {
                currentIndex = (currentIndex + 1) % 5;
                updateCarousel();
            });

            prevBtn.addEventListener('click', () => {
                currentIndex = (currentIndex - 1 + 5) % 5;
                updateCarousel();
            });

            // --- 手機版觸控滑動 (Swipe) ---
            let startX = 0;
            let endX = 0;
            const swipeThreshold = 50; 

            carouselWrapper.addEventListener('touchstart', (e) => {
                startX = e.changedTouches[0].screenX;
            }, { passive: true });

            carouselWrapper.addEventListener('touchend', (e) => {
                endX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });

            function handleSwipe() {
                let diffX = startX - endX;

                if (Math.abs(diffX) > swipeThreshold) {
                    if (diffX > 0) {
                        currentIndex = (currentIndex + 1) % 5; // 向左滑 (看下一張)
                    } else {
                        currentIndex = (currentIndex - 1 + 5) % 5; // 向右滑 (看上一張)
                    }
                    updateCarousel();
                }
            }
        });
    </script>
</body>
</html>
